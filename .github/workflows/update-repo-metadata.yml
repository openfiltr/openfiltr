name: Update Repository Metadata

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/update-repo-metadata.yml']

permissions:
  administration: write

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Update description and topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo edit ${{ github.repository }} \
            --description "Block Sudoku Trainer – place blocks, clear rows & columns, and beat your best score." \
            --add-topic block-sudoku \
            --add-topic puzzle-game \
            --add-topic javascript \
            --add-topic html5 \
            --add-topic game \
            --add-topic browser-game \
            --add-topic single-page-application \
            --add-topic vanilla-js \
            --add-topic github-pages
