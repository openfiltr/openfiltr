name: Create Project Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print issues without creating)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    name: Create Labels and Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create labels and issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: bash scripts/create-issues.sh
