name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare release metadata
        id: meta
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev gcc-aarch64-linux-gnu
      - name: Build release artefacts
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUILD_DATE="${{ steps.meta.outputs.build_date }}"
          mkdir -p dist

          build_binary() {
            local goos=$1
            local goarch=$2
            local cgo_enabled=$3
            local cc=${4:-}
            local binary="openfiltr-${goos}-${goarch}"

            if [ -n "$cc" ]; then
              CC="$cc" GOOS="$goos" GOARCH="$goarch" CGO_ENABLED="$cgo_enabled" go build \
                -ldflags="-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.buildDate=$BUILD_DATE" \
                -o "dist/${binary}" ./cmd/server
            else
              GOOS="$goos" GOARCH="$goarch" CGO_ENABLED="$cgo_enabled" go build \
                -ldflags="-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.buildDate=$BUILD_DATE" \
                -o "dist/${binary}" ./cmd/server
            fi

            tar -C dist -czf "dist/${binary}.tar.gz" "$binary"
          }

          build_binary linux amd64 1 gcc
          build_binary linux arm64 1 aarch64-linux-gnu-gcc
          build_binary darwin amd64 0
          build_binary darwin arm64 0

          (cd dist && sha256sum *.tar.gz > checksums.txt)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/openfiltr/openfiltr:latest
            ghcr.io/openfiltr/openfiltr:${{ github.ref_name }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
