name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate static site metadata
        run: sh scripts/validate-static-site.sh

      - name: Validate Pages workflows
        run: sh scripts/validate-github-pages-workflows.sh

      - name: Validate scripts without ripgrep
        run: sh scripts/test-validation-portability.sh

      - name: Parse workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].sort.each { |file| YAML.load_file(file); puts "OK #{file}" }'
