name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: Download modules
        run: go mod download
      - name: Run go vet
        run: go vet ./...

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false
          use_oidc: true

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Build
        run: |
          mkdir -p dist
          VERSION=${GITHUB_SHA::7}
          COMMIT=${GITHUB_SHA}
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o dist/openfiltr-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/server
      - uses: actions/upload-artifact@v4
        with:
          name: openfiltr-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/openfiltr-${{ matrix.goos }}-${{ matrix.goarch }}

  build-openwrt-router:
    name: Build OpenWrt Router
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Build OpenWrt router artefacts
        run: |
          set -euo pipefail
          mkdir -p dist/openwrt
          VERSION=${GITHUB_SHA::7}
          COMMIT=${GITHUB_SHA}
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o dist/openfiltr-linux-arm64 \
            ./cmd/server

          package_router() {
            local asset=$1
            local stage="dist/openwrt/${asset}"
            rm -rf "${stage}"
            mkdir -p "${stage}"
            install -m 0755 dist/openfiltr-linux-arm64 "${stage}/openfiltr"
            tar -C "${stage}" -czf "dist/${asset}.tar.gz" openfiltr
          }

          package_router openfiltr-openwrt-arm64
          package_router openfiltr-openwrt-mt3000
          package_router openfiltr-openwrt-mt6000
          (cd dist && sha256sum openfiltr-openwrt-*.tar.gz > openfiltr-openwrt-checksums.txt)
      - uses: actions/upload-artifact@v4
        with:
          name: openfiltr-openwrt-router
          path: |
            dist/openfiltr-openwrt-*.tar.gz
            dist/openfiltr-openwrt-checksums.txt

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4
      - name: Prepare build metadata
        id: meta
        run: |
          echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: ghcr.io/openfiltr/openfiltr:ci
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
