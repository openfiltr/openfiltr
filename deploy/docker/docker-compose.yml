services:
  openfiltr:
    image: ghcr.io/openfiltr/openfiltr:latest
    container_name: openfiltr
    ports:
      - "53:5353/udp"
      - "53:5353/tcp"
      - "3000:3000"
    volumes:
      - openfiltr-config:/etc/openfiltr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  openfiltr-config:
