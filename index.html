<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Burokeshoku">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f2f2f7">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Burokeshoku</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="hdr">
      <a class="icon-btn" href="https://github.com/Bigalan09/burokeshoku" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
      <div id="score-wrap">
        <div id="score-main">0</div>
        <div id="score-sub">
          <span>Today&nbsp;<span id="today-val">0</span></span>
          <span>🏆&nbsp;<span id="best-val">0</span></span>
        </div>
      </div>
      <button class="icon-btn" id="btn-settings" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="2"/>
          <path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M4.1 4.1l1.4 1.4M14.5 14.5l1.4 1.4M4.1 15.9l1.4-1.4M14.5 5.5l1.4-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- Main play area -->
    <main id="main">

      <!-- Board -->
      <div id="board-wrap">
        <div id="board"></div>
      </div>

      <!-- Training panel (hidden by default) -->
      <div id="training-panel" hidden>
        <div id="health-row">
          <span class="metric" id="m-holes">Holes&nbsp;<b>0</b></span>
          <span class="metric" id="m-lanes">Lanes&nbsp;<b>18</b></span>
          <span class="metric" id="m-centre">Centre&nbsp;<b>ok</b></span>
          <span class="metric" id="m-combo">Combo&nbsp;<b>0</b></span>
        </div>
        <div id="strategy-note"></div>
        <div id="move-eval"></div>
        <div id="train-btns">
          <button class="pill-btn" id="btn-hint">💡 Hint</button>
          <button class="pill-btn" id="btn-restart">↺ Restart</button>
        </div>
      </div>

      <!-- Piece rack -->
      <div id="rack"></div>

    </main>

    <!-- Settings overlay -->
    <div id="ov-settings" class="overlay" hidden>
      <div class="ov-card">
        <h2>Settings</h2>
        <label class="tog-row">
          <span>Training Mode</span>
          <span class="tog-wrap">
            <input type="checkbox" id="chk-training">
            <span class="tog-track"><span class="tog-thumb"></span></span>
          </span>
        </label>
        <label class="tog-row">
          <span>Extended Pieces</span>
          <span class="tog-wrap">
            <input type="checkbox" id="chk-extended">
            <span class="tog-track"><span class="tog-thumb"></span></span>
          </span>
        </label>
        <label class="tog-row">
          <span>Dark Mode</span>
          <span class="tog-wrap">
            <input type="checkbox" id="chk-dark">
            <span class="tog-track"><span class="tog-thumb"></span></span>
          </span>
        </label>
        <div class="setting-row">
          <span>Block Colour</span>
          <select id="sel-color">
            <option value="orange">🟠 Orange</option>
            <option value="blue">🔵 Blue</option>
            <option value="green">🟢 Green</option>
            <option value="purple">🟣 Purple</option>
            <option value="red">🔴 Red</option>
            <option value="teal">💎 Teal</option>
            <option value="pink">💗 Pink</option>
            <option value="random">🎲 Random</option>
          </select>
        </div>
        <div class="setting-row">
          <span>Pieces per Round</span>
          <select id="sel-rack">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
          </select>
        </div>
        <button class="pill-btn wide" id="btn-done">Done</button>
        <button class="pill-btn wide danger" id="btn-clear-data">🗑️ Clear All Data</button>
      </div>
    </div>

    <!-- Game-over overlay -->
    <div id="ov-gameover" class="overlay" hidden>
      <div class="ov-card">
        <h2>Game Over</h2>
        <p id="go-score"></p>
        <p id="go-best"></p>
        <button class="pill-btn wide" id="btn-new">New Game</button>
      </div>
    </div>

  </div><!-- #app -->

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // Capture whether a SW was already controlling this page before we register.
      // Used below to distinguish a first-install (no reload needed) from an update.
      const hadController = !!navigator.serviceWorker.controller;

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });

      // When a new SW takes over (skipWaiting + clients.claim), reload so the
      // user immediately sees the fresh assets instead of the stale cached ones.
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (hadController && !refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }
  </script>
</body>
</html>
